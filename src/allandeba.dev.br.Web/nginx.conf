server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml application/wasm image/svg+xml;
    gzip_static on;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SPA shell: never cache so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Blazor framework files: content-hashed filenames, safe to cache forever
    location /_framework/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images and fonts: 1 week
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=604800";
    }

    error_page 404 /index.html;
}
